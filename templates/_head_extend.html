<meta name="google" content="notranslate">
<style>
#inline-toc details { border: none; }
#name { font-size: 1.5em; }
.prose h1 { font-size: 1.75em; }
.prose h2 { font-size: 1.4em; }
.prose h3 { font-size: 1.2em; }
.prose h4, .prose h5, .prose h6 { font-size: 1.1em; }
body { --avatar-size: 48px; }
@media (max-width: 425px) {
  #name { font-size: 1.2em; }
  body { --avatar-size: 36px; }
  .prose h1 { font-size: 1.4em; }
  .prose h2 { font-size: 1.2em; }
  .prose h3 { font-size: 1.1em; }
  .prose h4, .prose h5, .prose h6 { font-size: 1em; }
}
body.homepage #wrapper { justify-content: start; }
body.homepage main { padding: 1.5em 0; }
body.homepage .layout-list { margin-top: 2em; }
footer .right #theme-toggle svg { scale: 1; }
.prose table { width: 100%; border: none; }
.table-wrapper { overflow-x: auto; }
.prose .mermaid svg { max-width: 100%; height: auto; }
.tag-pill {
  display: inline-block;
  padding: 0.2em 0.7em;
  border-radius: 9999px;
  font-size: 0.85em;
  background: var(--primary-pale-color);
  color: var(--primary-color);
  text-decoration: none;
  line-height: 1.4;
  transition: background 0.15s, color 0.15s;
}
.tag-pill:hover {
  background: var(--primary-color);
  color: #fff;
}
</style>
<script type="module">
  const blocks = document.querySelectorAll('code[data-lang="mermaid"]');
  if (blocks.length > 0) {
    blocks.forEach((code) => {
      const pre = code.parentElement;
      const el = document.createElement('pre');
      el.classList.add('mermaid');
      el.textContent = code.textContent;
      pre.replaceWith(el);
    });
    const mermaid = await import('https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs');
    mermaid.default.initialize({ startOnLoad: true });
  }

  document.querySelectorAll('.prose table').forEach((table) => {
    const wrapper = document.createElement('div');
    wrapper.classList.add('table-wrapper');
    table.parentNode.insertBefore(wrapper, table);
    wrapper.appendChild(table);
  });
</script>
