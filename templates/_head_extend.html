<meta name="google" content="notranslate">
<style>
#inline-toc details { border: none; }
#name { font-size: 1.5em; }
body.homepage #wrapper { justify-content: start; }
body.homepage main { padding: 1.5em 0; }
body.homepage .layout-list { margin-top: 2em; }
footer .right #theme-toggle svg { scale: 1; }
.prose table { width: 100%; border: none; }
.table-wrapper { overflow-x: auto; }
.prose .mermaid svg { max-width: 100%; height: auto; }
</style>
<script type="module">
  const blocks = document.querySelectorAll('code[data-lang="mermaid"]');
  if (blocks.length > 0) {
    blocks.forEach((code) => {
      const pre = code.parentElement;
      const el = document.createElement('pre');
      el.classList.add('mermaid');
      el.textContent = code.textContent;
      pre.replaceWith(el);
    });
    const mermaid = await import('https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs');
    mermaid.default.initialize({ startOnLoad: true });
  }

  document.querySelectorAll('.prose table').forEach((table) => {
    const wrapper = document.createElement('div');
    wrapper.classList.add('table-wrapper');
    table.parentNode.insertBefore(wrapper, table);
    wrapper.appendChild(table);
  });
</script>
