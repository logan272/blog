<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ config.title }}{% endblock title %}</title>
    <meta name="description" content="{% block description %}{{ config.description }}{% endblock description %}">
    <link rel="stylesheet" href="{{ get_url(path='css/style.css') }}">
    <link rel="alternate" type="application/atom+xml" title="{{ config.title }}" href="{{ get_url(path='atom.xml') }}">
    {% block head %}{% endblock head %}
</head>
<body>
    <header class="site-header">
        <nav>
            <a href="{{ config.base_url }}" class="site-title">{{ config.title }}</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock content %}
    </main>

    <footer class="site-footer">
        <p>&copy; {{ now() | date(format="%Y") }} {{ config.title }}</p>
    </footer>

    <!-- Mermaid -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({
            startOnLoad: false,
            theme: 'dark',
            securityLevel: 'loose',
        });

        // Convert mermaid code blocks into mermaid diagrams
        // Zola may render as class="language-mermaid" or data-lang="mermaid"
        document.querySelectorAll('pre code[class*="language-mermaid"], pre code[data-lang="mermaid"]').forEach(function(codeBlock) {
            const pre = codeBlock.parentElement;
            const div = document.createElement('div');
            div.className = 'mermaid';
            div.textContent = codeBlock.textContent;
            pre.parentNode.replaceChild(div, pre);
        });

        mermaid.run();
    </script>

    <!-- MathJax -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$']],
                displayMath: [['$$', '$$']],
                packages: {'[+]': ['ams']}
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
</body>
</html>
