{% extends "base.html" %}

{% block title %}Tags | {{ config.title }}{% endblock title %}

{% block content %}
<div class="post-list">
    <h1>Tags</h1>
    <ul class="tag-list">
    {% for term in terms %}
        <li><a href="{{ term.permalink }}">{{ term.name }}</a> ({{ term.pages | length }})</li>
    {% endfor %}
    </ul>
</div>
{% endblock content %}
